name: TIL Notion Sync

on:
  schedule:
    # UTC 15:05 = KST 다음날 00:05
    - cron: "5 15 * * *"
  workflow_dispatch: {}  # Actions 탭에서 수동 실행 가능

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 의존성 설치
        run: pip install -r scripts/requirements.txt

      - name: Notion → Markdown 변환
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          NOTION_DATE_PROPERTY: ${{ vars.NOTION_DATE_PROPERTY }}
          NOTION_TAGS_PROPERTY: ${{ vars.NOTION_TAGS_PROPERTY }}
          NOTION_SUBJECT_PROPERTY: ${{ vars.NOTION_SUBJECT_PROPERTY }}
        run: python scripts/notion_to_md.py

      - name: 변경 사항 커밋 & 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add TIL README.md
          if git diff --cached --quiet; then
            echo "변경된 내용이 없습니다."
          else
            git commit -m "chore: TIL 자동 동기화 $(date -u +'%Y-%m-%d')"
            git push
          fi
